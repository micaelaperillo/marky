name: Terraform bootstrap setup

on:
  workflow_dispatch:
    inputs:
      user:
        type: choice
        description: The user running the action
        required: true
        options:
          - professor-x
          - agus
          - uri
          - manu
          - mica
          - tomi
      create:
        type: boolean
        description: Wheater to create the bucket, otherwise only checks availability
        required: true
  workflow_call:
    inputs:
      user:
        type: string
        description: The user running the action
        required: true
      create:
        type: boolean
        description: Wheater to create the bucket, otherwise only checks availability
        required: true

env:
  AWS_REGION: us-east-1

jobs:
  idk:
    name: Configure the Terraform bootstrap
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/bootstrap

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Terraform bootstrap
        if: ${{ inputs.create }}
        run: |
          terraform init
          terraform apply

      - name: Verify state bucket exists
        run: |
          aws s3api head-bucket --bucket marky-tfstate 2>/dev/null || {
            echo "You swore to me you had a bucket, but it ain't there..."
            echo "How dare you?"
            echo
            echo "You better call me with create_bucket next time, or else..."
            echo
            echo "Unless you just did, which means the bucket creation failed"
            echo ":)"
            exit 1
          }
