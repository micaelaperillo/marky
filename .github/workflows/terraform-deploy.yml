name: 'Deploy Infrastructure'

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
  TF_VAR_bluesky_identifier: ${{ secrets.BLUESKY_IDENTIFIER }}
  TF_VAR_bluesky_app_password: ${{ secrets.BLUESKY_APP_PASSWORD }}

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          version: '10'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build
        working-directory: lambdas
        run: pnpm i && pnpm -r build

      - name: Verify state bucket exists
        run: |
          aws s3api head-bucket --bucket marky-tfstate 2>/dev/null || {
            echo "::error::State bucket 'marky-tfstate' not found. Run the one-time bootstrap first: cd terraform/bootstrap && terraform init && terraform apply"
            exit 1
          }

      - name: Pull Terraform state from S3
        working-directory: terraform
        run: aws s3 cp "s3://marky-tfstate/terraform.tfstate" terraform.tfstate || echo "No existing state in S3; starting fresh."

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false

      - name: Push Terraform state to S3
        if: always()
        working-directory: terraform
        run: |
          if [ -f terraform.tfstate ]; then
            aws s3 cp terraform.tfstate "s3://marky-tfstate/terraform.tfstate"
          else
            echo "No local state file to push."
          fi

      - name: Deploy Frontend
        working-directory: .
        run: make deploy-frontend
