# separate terms of service, privacy policy, and support
# documentation.

name: Terraform Security

on:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  tfsec-run:
    name: Run tfsec sarif report
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Run tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.3
        with:
          sarif_file: tfsec.sarif         

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tfsec.sarif

  tf-comments:
    name: Terraform Security PR commenter
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: tfsec
        uses: aquasecurity/tfsec-pr-commenter-action@5b483d46fb4fd0cbe2259cf68354a3fb23aa70fe
        with:
          working_directory: terraform
          tfsec_args: --minimum-severity MEDIUM
          tfsec_formats: sarif,csv
          soft_fail_commenter: true
          github_token: ${{ github.token }}
